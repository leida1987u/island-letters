<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>岛屿来信</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.15.2/dist/av-min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a2744;--navy-d:#0f1a2e;--navy-l:#2a3d5e;--gold:#c9a84c;--gold-m:#b8973f;--gold-g:rgba(201,168,76,.15);--ink:#2c2416;--ink-l:#4a3f30;--ink-f:#6b5d4e;--paper:#f5f0e8;--paper-d:#e8e0d0;--cream:#faf6ee;--card:rgba(250,246,238,.72);--card-b:rgba(201,168,76,.2);--sh:rgba(15,26,46,.08)}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Songti SC','STSong','SimSun','Noto Serif SC',serif;color:var(--ink);background:var(--paper);line-height:1.7;min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(26,39,68,.03) 0%,transparent 50%),url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--navy-l);border-radius:2px}
#app{max-width:480px;margin:0 auto;padding-bottom:70px}

.hero{position:relative;width:100%;height:42vw;max-height:240px;min-height:160px;overflow:hidden;border-radius:0 0 20px 20px}
.hero-img{width:100%;height:100%;object-fit:cover;background:linear-gradient(160deg,var(--navy-d),var(--navy),var(--navy-l))}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(15,26,46,.2),rgba(15,26,46,.6),rgba(15,26,46,.9));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.hero-t{font-family:'STXingkai','STKaiti','Kaiti SC','KaiTi',serif;font-size:clamp(1.6rem,6vw,2.2rem);color:var(--cream);letter-spacing:.15em;text-shadow:0 2px 12px rgba(0,0,0,.3);font-weight:400}
.hero-s{font-size:clamp(.7rem,2.8vw,.85rem);color:rgba(245,240,232,.65);letter-spacing:.08em;font-style:italic;margin-top:4px}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(250,246,238,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--card-b);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px 4px;font-size:.6rem;color:var(--ink-f);cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:inherit;min-height:48px}
.bnav .tab .ico{font-size:1.15rem;margin-bottom:1px}
.bnav .tab.on{color:var(--gold-m)}
.bnav .tab.on .ico{transform:scale(1.15)}

/* Section title */
.stitle{font-family:'STXingkai','STKaiti','Kaiti SC','KaiTi',serif;font-size:1rem;color:var(--navy);padding:14px 14px 6px;display:flex;align-items:center;gap:6px;letter-spacing:.06em}
.stitle::before{content:'';width:3px;height:1em;background:linear-gradient(to bottom,var(--gold),transparent);border-radius:2px}

/* Glass card */
.gc{background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--card-b);border-radius:14px;padding:14px;margin:8px 12px;box-shadow:0 2px 14px var(--sh);position:relative;overflow:hidden}
.gc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-m),transparent);opacity:.35}

/* Compose */
.compose{margin:8px 12px}
.cf{margin-bottom:8px}
.cf label{display:block;font-size:.75rem;color:var(--ink-f);margin-bottom:3px}
.cf input,.cf textarea,.cf select{width:100%;padding:9px 11px;border:1px solid rgba(201,168,76,.2);border-radius:10px;background:rgba(250,246,238,.6);font-family:inherit;font-size:.88rem;color:var(--ink);outline:none;transition:.2s;-webkit-appearance:none}
.cf input:focus,.cf textarea:focus{border-color:var(--gold-m)}
.cf textarea{resize:vertical;min-height:60px;line-height:1.6}
.crow{display:flex;gap:8px}.crow .cf{flex:1}

.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 18px;border:none;border-radius:10px;font-family:inherit;font-size:.85rem;cursor:pointer;transition:.2s;letter-spacing:.04em;-webkit-tap-highlight-color:transparent}
.btn-p{background:linear-gradient(135deg,var(--navy),var(--navy-l));color:var(--cream);width:100%}
.btn-p:active{transform:scale(.97)}.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:var(--gold-g);border:1px solid var(--card-b);color:var(--ink-l);width:100%}
.btn-s:active{background:var(--gold-g);border-color:var(--gold-m)}

/* Cards */
.card{background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--card-b);border-radius:14px;padding:14px;margin:8px 12px;box-shadow:0 2px 14px var(--sh);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-m),transparent);opacity:.35}
.ch{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--navy-l),var(--navy));display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:.78rem;font-weight:600;flex-shrink:0}
.cm{flex:1;min-width:0}.cn{font-size:.88rem;font-weight:600;color:var(--navy);line-height:1.2}.ct{font-size:.7rem;color:var(--ink-f)}
.cb{font-size:.88rem;line-height:1.7;color:var(--ink-l);word-break:break-word;white-space:pre-wrap}
.ci{margin-top:8px;border-radius:10px;overflow:hidden;background:var(--paper-d)}
.ci img{width:100%;display:block}
.cf2{display:flex;align-items:center;justify-content:flex-end;margin-top:10px;padding-top:8px;border-top:1px solid rgba(201,168,76,.1)}

/* Pat/Like button */
.pbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid rgba(201,168,76,.22);border-radius:18px;background:transparent;font-family:inherit;font-size:.78rem;color:var(--ink-f);cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
.pbtn:active,.pbtn.liked{background:var(--gold-g);border-color:var(--gold-m);color:var(--gold-m);transform:scale(.95)}

/* States */
.sm{text-align:center;padding:36px 20px;color:var(--ink-f);font-size:.85rem;line-height:1.8}
.sm .ic{font-size:1.8rem;margin-bottom:10px;display:block}
.ld::after{content:'';animation:dots 1.4s steps(4,end) infinite}
@keyframes dots{25%{content:'。'}50%{content:'。。'}75%{content:'。。。'}}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:var(--cream);padding:9px 22px;border-radius:11px;font-size:.82rem;z-index:999;box-shadow:0 4px 18px rgba(0,0,0,.2);max-width:80vw;text-align:center;animation:tin .3s}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Refresh */
.rbar{display:flex;justify-content:center;padding:6px 12px}
.rbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 18px;border:1px solid rgba(201,168,76,.18);border-radius:18px;background:rgba(250,246,238,.5);font-family:inherit;font-size:.78rem;color:var(--ink-f);cursor:pointer;-webkit-tap-highlight-color:transparent}
.rbtn:active{background:var(--gold-g)}
.spin{display:inline-block;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Check-in types */
.cit{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.cit .ci-btn{flex:1;min-width:70px;padding:10px;border:1px solid var(--card-b);border-radius:12px;background:var(--card);font-family:inherit;font-size:.82rem;color:var(--ink-l);cursor:pointer;text-align:center;transition:.2s;-webkit-tap-highlight-color:transparent}
.cit .ci-btn:active,.cit .ci-btn.done{background:var(--gold-g);border-color:var(--gold-m);color:var(--gold-m)}

/* Streak display */
.streak{text-align:center;padding:16px}
.streak .num{font-size:2.5rem;font-weight:700;color:var(--gold-m);font-family:'Songti SC',serif}
.streak .lbl{font-size:.78rem;color:var(--ink-f)}

/* Leaderboard */
.lb-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(201,168,76,.08)}
.lb-rank{width:24px;height:24px;border-radius:50%;background:var(--gold-g);display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--gold-m);font-weight:700}

/* News list */
.ni{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.08);align-items:flex-start}
.ni-r{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--cream);flex-shrink:0}
.ni-r.t{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.ni-r.n{background:var(--navy-l)}
.ni-t{font-size:.85rem;color:var(--ink-l);line-height:1.5;flex:1}

/* Poll */
.poll-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:4px 0;border:1px solid var(--card-b);border-radius:10px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.poll-opt:active{border-color:var(--gold-m)}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:var(--gold-g);transition:.5s;border-radius:10px}
.poll-txt{position:relative;z-index:1;font-size:.85rem;flex:1}
.poll-cnt{position:relative;z-index:1;font-size:.75rem;color:var(--ink-f)}

/* Mood */
.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.mood-btn{padding:12px 8px;border:1px solid var(--card-b);border-radius:12px;background:var(--card);font-size:1.4rem;text-align:center;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
.mood-btn:active,.mood-btn.sel{background:var(--gold-g);border-color:var(--gold-m);transform:scale(.95)}
.mood-board{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.mood-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--gold-g);border-radius:14px;font-size:.78rem}

/* Game sub-tabs */
.gtabs{display:flex;gap:6px;margin:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.gtab{padding:6px 14px;border-radius:16px;font-size:.78rem;white-space:nowrap;cursor:pointer;border:1px solid var(--card-b);background:var(--card);color:var(--ink-f);font-family:inherit;-webkit-tap-highlight-color:transparent}
.gtab.on{background:var(--gold-g);border-color:var(--gold-m);color:var(--gold-m)}

/* Entry animation */
.splash{position:fixed;inset:0;background:var(--navy-d);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sout 0.5s 2s forwards}
.splash .boat{font-size:2.5rem;animation:bsail 2s ease-out forwards}
.splash .ltxt{font-family:'STXingkai','STKaiti','Kaiti SC',serif;color:var(--cream);font-size:1.3rem;letter-spacing:.15em;margin-top:16px;opacity:0;animation:fin .5s 1s forwards}
@keyframes bsail{0%{transform:translateX(-100px);opacity:0}60%{opacity:1}100%{transform:translateX(0);opacity:1}}
@keyframes fin{to{opacity:1}}
@keyframes sout{to{opacity:0;pointer-events:none}}

/* Ambient btn */
.amb{position:fixed;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(250,246,238,.7);backdrop-filter:blur(10px);border:1px solid var(--card-b);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;z-index:50;-webkit-tap-highlight-color:transparent}
.amb:active{transform:scale(.9)}

/* Image fallback */
.img-fb{padding:30px 12px;text-align:center;color:var(--ink-f);font-size:.78rem;background:var(--paper-d);border-radius:10px}

/* Footer */
.sfoot{text-align:center;padding:14px 20px 28px;color:var(--ink-f);font-size:.7rem;letter-spacing:.06em;opacity:.5}

/* Photo grid */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px}
.pcard{border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--card-b)}
.pcard img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.pcard .pinf{padding:8px;font-size:.75rem;color:var(--ink-l)}
.pcard .pby{font-size:.68rem;color:var(--ink-f)}

/* Song card */
.song-card{margin:12px;background:linear-gradient(135deg,var(--navy-d),var(--navy));border-radius:16px;padding:20px;color:var(--cream)}
.song-card .sname{font-family:'STXingkai','STKaiti','Kaiti SC',serif;font-size:1.2rem}
.song-card .sartist{font-size:.82rem;opacity:.7;margin:4px 0 12px}
.song-card .sreason{font-size:.82rem;opacity:.8;line-height:1.6;font-style:italic;border-left:2px solid var(--gold);padding-left:10px}
.song-card .sby{font-size:.72rem;opacity:.5;margin-top:10px;text-align:right}

/* Analysis result */
.ar-card{background:linear-gradient(135deg,var(--cream),var(--paper));border:1px solid var(--card-b);border-radius:14px;padding:16px;margin:8px 12px}
.ar-dim{margin:6px 0;padding:6px 0;border-bottom:1px solid rgba(201,168,76,.1)}
.ar-dim:last-child{border:none}
.ar-label{font-size:.78rem;color:var(--gold-m);font-weight:600}
.ar-val{font-size:.85rem;color:var(--ink-l);margin-top:2px;line-height:1.5}
.ar-note{font-size:.72rem;color:var(--ink-f);font-style:italic;margin-top:10px}

.fade-enter-active,.fade-leave-active{transition:opacity .3s}
.fade-enter-from,.fade-leave-to{opacity:0}
</style>
</head>
<body>
<div id="app">

<!-- Splash -->
<div class="splash" v-if="showSplash" @click="showSplash=false">
  <div class="boat">⛵</div>
  <div class="ltxt">岛屿来信</div>
</div>

<!-- Toast -->
<transition name="fade"><div class="toast" v-if="toast.msg" v-text="toast.msg"></div></transition>

<!-- Ambient toggle -->
<div class="amb" @click="toggleAmbient" :title="ambientOn?'关闭海浪声':'开启海浪声'">
  {{ ambientOn ? '🔊' : '🔈' }}
</div>

<!-- Hero -->
<header class="hero">
  <img class="hero-img" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=960&q=80" alt="">
  <div class="hero-ov">
    <h1 class="hero-t">岛屿来信</h1>
    <p class="hero-s" v-text="heroSub"></p>
  </div>
</header>

<!-- Toast nickname prompt if no nickname -->
<div class="gc" v-if="!nickname" style="text-align:center">
  <div class="cf">
    <label>给自己取个岛上昵称吧</label>
    <input v-model="nickInput" placeholder="岛上的人" maxlength="20" @keyup.enter="setNick">
  </div>
  <button class="btn btn-p" @click="setNick" :disabled="!nickInput">🏝 登岛</button>
</div>

<!-- TAB 1: 广场 -->
<template v-if="tab==='feed'">
  <div class="stitle">写点近况</div>
  <div class="gc compose">
    <div class="cf"><label>想说的话</label>
      <textarea v-model="feedForm.content" placeholder="今天怎么样？" maxlength="1000" rows="3"></textarea>
    </div>
    <div class="crow">
      <div class="cf"><label>图片链接(可选)</label><input v-model="feedForm.mediaUrl" placeholder="https://..."></div>
      <div class="cf" style="flex:0 0 80px"><label>类型</label>
        <select v-model="feedForm.mediaType"><option value="text">文字</option><option value="image">图片</option></select>
      </div>
    </div>
    <button class="btn btn-p" @click="postFeed" :disabled="posting||!feedForm.content">{{posting?'投递中…':'✉ 投递到小岛'}}</button>
  </div>
  <div class="rbar"><button class="rbtn" @click="loadFeed" :disabled="loadingFeed"><span v-if="loadingFeed" class="spin">⟳</span><span v-else>⟳</span> {{loadingFeed?'打捞中…':'刷新'}}</button></div>
  <div class="stitle">最近的来信</div>
  <div class="sm" v-if="loadingFeed&&feedList.length===0"><span class="ic">🌊</span><span class="ld">正在从海面打捞</span></div>
  <div class="sm" v-else-if="!loadingFeed&&feedList.length===0"><span class="ic">🏝</span>还没有来信，写下第一句吧</div>
  <div class="card" v-for="m in feedList" :key="m.id">
    <div class="ch"><div class="av">{{(m.nickname||'岛')[0]}}</div><div class="cm"><div class="cn" v-text="m.nickname"></div><div class="ct" v-text="fmtTime(m.ts)"></div></div></div>
    <div class="cb" v-text="m.content"></div>
    <div class="ci" v-if="m.mediaType==='image'&&m.mediaUrl"><img :src="m.mediaUrl" loading="lazy" @error="$event.target.parentElement.innerHTML='<div class=img-fb>📷 图片加载失败</div>'"></div>
    <div class="cf2"><button class="pbtn" :class="{liked:liked[m.id]}" @click="likeFeed(m)">❤ <span v-if="m.likes">{{m.likes}}</span></button></div>
  </div>
</template>

<!-- TAB 2: 打卡 -->
<template v-if="tab==='checkin'">
  <div class="stitle">{{todayStr}} · 今日打卡</div>
  <div class="gc">
    <div class="cit">
      <button class="ci-btn" v-for="t in ciTypes" :key="t.id" :class="{done:todayCI[t.id]}" @click="doCheckin(t.id)">
        {{t.icon}} {{t.label}}<br><span style="font-size:.7rem" v-if="todayCI[t.id]">已打卡</span>
      </button>
    </div>
  </div>
  <div class="gc" v-if="myStreak>0">
    <div class="streak"><div class="num">{{myStreak}}</div><div class="lbl">🔥 连续打卡天数</div></div>
  </div>
  <div class="stitle">今日谁打卡了</div>
  <div class="sm" v-if="todayCheckins.length===0">还没有人打卡，抢个第一吧 🥇</div>
  <div class="card" v-for="c in todayCheckins" :key="c.id">
    <div class="ch"><div class="av">{{(c.nickname||'岛')[0]}}</div><div class="cm"><div class="cn" v-text="c.nickname"></div><div class="ct">{{ciLabel(c.type)}} · {{fmtTime(c.ts)}}</div></div></div>
  </div>
  <div class="stitle">🏆 打卡排行榜</div>
  <div class="gc">
    <div class="lb-item" v-for="(u,i) in ciRank" :key="u.nick">
      <div class="lb-rank">{{i+1}}</div>
      <div style="flex:1"><div class="cn" v-text="u.nick"></div></div>
      <div style="color:var(--gold-m);font-weight:600">{{u.days}}天</div>
    </div>
    <div class="sm" v-if="ciRank.length===0">还没有打卡记录</div>
  </div>
</template>

<!-- TAB 3: 笔迹分析 -->
<template v-if="tab==='analysis'">
  <div class="stitle">笔迹性格分析</div>
  <div class="gc">
    <div class="cf"><label>上传笔迹图片链接</label><input v-model="analysisForm.imgUrl" placeholder="图片URL（可选）"></div>
    <div class="cf"><label>描述笔迹特征或提问</label><textarea v-model="analysisForm.desc" placeholder="比如：字迹偏右倾斜，字间距较小，横画上扬..." rows="4"></textarea></div>
    <button class="btn btn-p" @click="startAnalysis" :disabled="analyzing||!analysisForm.desc">{{analyzing?'分析中…':'✍️ 开始分析'}}</button>
  </div>
  <div class="gc" style="margin:8px 12px;font-size:.78rem;color:var(--ink-f);line-height:1.6">
    📝 八维度分析：城府 / 个人品德 / 家庭观念 / 婚恋心理 / 思维方式 / 对外情绪 / 个人气质 / 个人天赋<br>
    ⚠️ AI分析仅供参考，不作为人格定论。建议结合多样本综合判断。
  </div>
  <div v-if="analysisResult">
    <div class="stitle">分析结果</div>
    <div class="ar-card">
      <div class="ar-dim" v-for="d in analysisResult" :key="d.dim">
        <div class="ar-label">{{d.dim}}</div>
        <div class="ar-val">{{d.text}}</div>
      </div>
      <div class="ar-note">⚠️ 笔迹分析基于特征假设，需结合多样本和情境综合判断。单一样本仅供参考。</div>
    </div>
  </div>
</template>

<!-- TAB 4: 热榜 -->
<template v-if="tab==='news'">
  <div class="stitle">今日热榜</div>

<!-- TAB 5: 今日歌 -->

    </div>
    <div class="gc compose">
      <div class="cf"><label>我的回答</label><textarea v-model="dqAnswer" placeholder="说说你的想法..." rows="2"></textarea></div>
      <button class="btn btn-p" @click="submitDQ" :disabled="!dqAnswer">提交回答</button>

    <div class="card" v-for="a in dqAnswers" :key="a.id">
      <div class="ch"><div class="av">{{(a.nick||'岛')[0]}}</div><div class="cm"><div class="cn" v-text="a.nick"></div><div class="ct" v-text="fmtTime(a.ts)"></div></div></div>

  <button class="tab" :class="{on:tab==='feed'}" @click="switchTab('feed')"><span class="ico">📮</span>广场</button>
  <button class="tab" :class="{on:tab==='checkin'}" @click="switchTab('checkin')"><span class="ico">✅</span>打卡</button>
  <button class="tab" :class="{on:tab==='analysis'}" @click="switchTab('analysis')"><span class="ico">✍️</span>笔迹</button>
  <button class="tab" :class="{on:tab==='news'}" @click="switchTab('news')"><span class="ico">🔥</span>热榜</button>
  <button class="tab" :class="{on:tab==='song'}" @click="switchTab('song')"><span class="ico">🎵</span>今日歌</button>
  <button class="tab" :class="{on:tab==='photo'}" @click="switchTab('photo')"><span class="ico">📸</span>每日图</button>
  <button class="tab" :class="{on:tab==='poll'}" @click="switchTab('poll')"><span class="ico">💬</span>问答</button>
  <button class="tab" :class="{on:tab==='game'}" @click="switchTab('game')"><span class="ico">🎮</span>游戏</button>

<script>
// ===== LeanCloud Config =====
const LC_CFG={APP_ID:'你的_APP_ID',APP_KEY:'你的_APP_KEY',SERVER_URL:'你的_SERVER_URL'};
let AV=window.AV,LC=null,LCReady=false;
if(AV&&LC_CFG.APP_ID&&!LC_CFG.APP_ID.startsWith('你的')){try{AV.init({appId:LC_CFG.APP_ID,appKey:LC_CFG.APP_KEY,serverURL:LC_CFG.SERVER_URL});LC=AV.Object.extend('Moment');LCReady=true;}catch(e){console.error(e);}}

const{createApp,ref,reactive,computed,onMounted}=Vue;

createApp({
setup(){
const nickname=ref(localStorage.getItem('il_nick')||'');
const nickInput=ref('');
const tab=ref('feed');
const showSplash=ref(true);
const toast=reactive({msg:'',t:null});
const ambientOn=ref(false);
let audioCtx=null,ambientOsc=null;

// Hero subtitles per tab
const heroMap={feed:'近况广场 · 朋友们的日常碎片',checkin:'每日打卡 · 坚持的每一天都算数',analysis:'笔迹分析 · 一笔一划都是你',news:'今日热榜 · 世界每天都在发生什么',song:'今日推荐 · 这首歌唱给你听',photo:'每日一图 · 今天的光影留给你',poll:'岛屿问答 · 猜猜朋友们怎么想',game:'岛屿游戏 · 来玩点什么吧'};
const heroSub=computed(()=>heroMap[tab.value]||'岛屿来信');

// Toast
function show(msg,d=2200){toast.msg=msg;clearTimeout(toast.t);toast.t=setTimeout(()=>toast.msg='',d);}

// Nickname
function setNick(){if(!nickInput.value.trim())return;nickname.value=nickInput.value.trim();localStorage.setItem('il_nick',nickname.value);show('欢迎登岛，'+nickname.value+' 🏝');}

// Tab switch
function switchTab(t){tab.value=t;}

// Time format
function fmtTime(ts){if(!ts)return'';let d=ts instanceof Date?ts:new Date(ts.iso||ts);if(isNaN(d))return'';const diff=Date.now()-d;if(diff<60000)return'刚刚';if(diff<3600000)return Math.floor(diff/60000)+'分钟前';if(diff<86400000)return Math.floor(diff/3600000)+'小时前';const p=n=>String(n).padStart(2,'0');return(d.getMonth()+1)+'月'+d.getDate()+'日 '+p(d.getHours())+':'+p(d.getMinutes());}
function fmtDate(d){if(!d)return'';const dd=new Date(d);if(isNaN(dd))return d;return(dd.getMonth()+1)+'月'+dd.getDate()+'日';}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ===== FEED =====
const feedList=ref([]);const loadingFeed=ref(false);const posting=ref(false);const liked=reactive({});
const feedForm=reactive({content:'',mediaType:'text',mediaUrl:''});

async function loadFeed(){
  if(!LCReady){return;}
  loadingFeed.value=true;
  try{
    const q=new AV.Query('Moment');q.descending('createdAt');q.limit(20);
    const r=await q.find();
    feedList.value=r.map(o=>({id:o.id,nickname:o.get('nickname')||'',content:o.get('content')||'',mediaType:o.get('mediaType')||'text',mediaUrl:o.get('mediaUrl')||'',ts:o.createdAt,likes:o.get('likes')||0}));
  }catch(e){console.error(e);show('加载失败');}
  finally{loadingFeed.value=false;}
}

async function postFeed(){
  if(!LCReady){show('LeanCloud未配置');return;}
  if(!feedForm.content){show('写点什么吧');return;}
  posting.value=true;
  try{
    const m=new LC();m.set('nickname',nickname.value);m.set('content',feedForm.content);m.set('mediaType',feedForm.mediaType);m.set('mediaUrl',feedForm.mediaUrl);m.set('likes',0);
    await m.save();show('✉ 来信已抵达小岛');
    feedForm.content='';feedForm.mediaUrl='';feedForm.mediaType='text';
    await loadFeed();
  }catch(e){console.error(e);show('发布失败');}
  finally{posting.value=false;}
}

async function likeFeed(m){
  if(liked[m.id])return;liked[m.id]=true;m.likes=(m.likes||0)+1;
  if(!LCReady)return;
  try{const o=AV.Object.createWithoutData('Moment',m.id);o.increment('likes');await o.save();}catch(e){m.likes--;delete liked[m.id];}
}

// ===== CHECK-IN =====
const ciTypes=[{id:'early',icon:'🌅',label:'早起'},{id:'gym',icon:'💪',label:'健身'},{id:'read',icon:'📚',label:'读书'},{id:'other',icon:'✨',label:'自定义'}];
const todayCI=reactive({});const todayCheckins=ref([]);const ciRank=ref([]);const myStreak=ref(0);

function ciLabel(id){return(ciTypes.find(t=>t.id===id)||{}).label||id;}

async function doCheckin(type){
  if(todayCI[type])return;
  if(!LCReady){show('LeanCloud未配置');return;}
  try{
    const ci=AV.Object.extend('CheckIn');const o=new ci();
    o.set('nickname',nickname.value);o.set('type',type);o.set('date',todayKey());o.set('ts',new Date().toISOString());
    await o.save();todayCI[type]=true;show('打卡成功！🔥');
    await loadCheckin();
  }catch(e){console.error(e);show('打卡失败');}
}

async function loadCheckin(){
  if(!LCReady)return;
  try{
    const CI=AV.Object.extend('CheckIn');const q=new AV.Query(CI);q.equalTo('date',todayKey());q.descending('createdAt');
    const r=await q.find();
    todayCheckins.value=r.map(o=>({id:o.id,nickname:o.get('nickname'),type:o.get('type'),ts:o.createdAt}));
    // My streak
    const q2=new AV.Query(CI);q2.equalTo('nickname',nickname.value);q2.descending('date');q2.limit(30);
    const r2=await q2.find();const dates=[...new Set(r2.map(o=>o.get('date')))].sort().reverse();
    let streak=0;const td=todayKey();
    for(let i=0;i<dates.length;i++){const exp=new Date(td);exp.setDate(exp.getDate()-i);const ek=exp.getFullYear()+'-'+String(exp.getMonth()+1).padStart(2,'0')+'-'+String(exp.getDate()).padStart(2,'0');if(dates.includes(ek))streak++;else break;}
    myStreak.value=streak;
    // Rank
    const q3=new AV.Query(CI);q3.select('nickname','date');q3.limit(1000);const r3=await q3.find();
    const cnt={};r3.forEach(o=>{const n=o.get('nickname');const d=o.get('date');if(!cnt[n])cnt[n]=new Set();cnt[n].add(d);});
    ciRank.value=Object.entries(cnt).map(([nick,s])=>({nick,days:s.size})).sort((a,b)=>b.days-a.days).slice(0,10);
    // Check today
    const myToday=r.filter(o=>o.get('nickname')===nickname.value);
    myToday.forEach(o=>todayCI[o.get('type')]=true);
  }catch(e){console.error(e);}
}

// ===== ANALYSIS =====
const analysisForm=reactive({imgUrl:'',desc:''});const analyzing=ref(false);const analysisResult=ref(null);

async function startAnalysis(){
  if(!analysisForm.desc){show('请描述笔迹特征');return;}
  analyzing.value=true;analysisResult.value=null;
  // Local template-based analysis
  await new Promise(r=>setTimeout(r,1500));
  const dims=['城府','个人品德','家庭观念','婚恋心理','思维方式','对外情绪','个人气质','个人天赋'];
  const desc=analysisForm.desc;
  const result=dims.map(d=>{
    let text='';
    if(d==='城府')text=desc.includes('右倾')||desc.includes('倾斜')?'表达较为委婉，有一定社会适应性，内在想法不一定直接表露。':'观察到书写较为端正，倾向于直接表达，社会适应性中等。';
    else if(d==='个人品德')text=desc.includes('整齐')||desc.includes('工整')?'秩序感较强，有一定责任心和自我约束力。':'书写有一定的随意性，做事可能更注重效率而非形式。';
    else if(d==='家庭观念')text=desc.includes('行距')?'行距适中，重视个人空间与边界，有一定的秩序意识。':'从现有特征看，家庭观念的具体表现需要更多书写样本验证。';
    else if(d==='婚恋心理')text=desc.includes('柔和')||desc.includes('轻')?'笔画偏柔和，情感表达可能较为含蓄温和。':'笔画有一定力度，情感表达可能相对直接。';
    else if(d==='思维方式')text=desc.includes('字距适中')||desc.includes('清晰')?'思维较为清晰有条理，有一定的判断能力。':'思维方式需结合更多特征综合判断。';
    else if(d==='对外情绪')text=desc.includes('上扬')||desc.includes('积极')?'横画上扬，对外呈现积极主动的情绪状态。':'对外情绪表现较为平稳，无明显极端倾向。';
    else if(d==='个人气质')text=desc.includes('倾斜')?'有一定的情感波动特征，面对现实的勇气与适应力并存。':'气质表现较为平稳，偏向理性。';
    else text='从笔画衔接和布局看，有一定的协调能力和空间直觉，创意突破方面偏保守。';
    return{dim:d,text};
  });
  analysisResult.value=result;analyzing.value=false;
  show('分析完成');
}

// ===== NEWS =====
const newsList=ref([]);const loadingNews=ref(false);
async function loadNews(){
  loadingNews.value=true;
  try{
    const resp=await fetch('https://60s.viki.moe/?v2=1');
    const data=await resp.json();
    if(data.data&&data.data.topics){
      newsList.value=data.data.topics.map((t,i)=>({title:t.title||t,url:t.url||''}));
    }else if(data.data&&data.data.news){
      newsList.value=data.data.news.map((n,i)=>({title:typeof n==='string'?n:n.title||'',url:n.url||''}));
    }
  }catch(e){
    console.error('News fetch failed:',e);
    newsList.value=[
      {title:'今日热榜加载失败，请稍后重试',url:''}
    ];
  }

const pollList=ref([]);const showPollForm=ref(false);const postingPoll=ref(false);
const pollForm=reactive({question:'',options:['','']});
const votedMap=JSON.parse(localStorage.getItem('il_votes')||'{}');

async function loadPoll(){
  if(!LCReady)return;
  try{
    const Q=AV.Object.extend('Poll');const q=new AV.Query(Q);q.descending('createdAt');q.limit(10);
    const r=await q.find();
    pollList.value=r.map(o=>({id:o.id,question:o.get('question'),options:o.get('options')||[],votes:o.get('votes')||{},creator:o.get('creator'),date:o.get('date')||todayKey()}));
  }catch(e){console.error(e);}
}

function pollCnt(p,i){const o=p.options[i];return(p.votes&&p.votes[o])?p.votes[o].length:0;}
function pollTotal(p){let t=0;if(p.votes)Object.values(p.votes).forEach(v=>t+=v.length);return t;}
function pollPct(p,i){const total=pollTotal(p);return total?Math.round(pollCnt(p,i)/total*100):0;}

async function votePoll(p,i){
  if(votedMap[p.id])return;
  const opt=p.options[i];
  if(!p.votes)p.votes={};
  if(!p.votes[opt])p.votes[opt]=[];
  p.votes[opt].push(nickname.value);
  votedMap[p.id]=opt;localStorage.setItem('il_votes',JSON.stringify(votedMap));
  if(!LCReady)return;
  try{const o=AV.Object.createWithoutData('Poll',p.id);o.set('votes',p.votes);await o.save();}catch(e){console.error(e);}
}

async function createPoll(){
  if(!pollForm.question||pollForm.options.filter(o=>o).length<2){show('至少填问题和2个选项');return;}
  if(!LCReady){show('LeanCloud未配置');return;}
  postingPoll.value=true;
  try{
    const Q=AV.Object.extend('Poll');const o=new Q();
    o.set('question',pollForm.question);o.set('options',pollForm.options.filter(x=>x));o.set('votes',{});o.set('creator',nickname.value);o.set('date',todayKey());
    await o.save();show('投票已创建！');
    pollForm.question='';pollForm.options=['',''];showPollForm.value=false;
    await loadPoll();
  }catch(e){console.error(e);show('创建失败');}
  finally{postingPoll.value=false;}
}

// ===== AMBIENT =====
function toggleAmbient(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(ambientOn.value){if(ambientOsc){ambientOsc.stop();ambientOsc=null;}ambientOn.value=false;return;}
  // Create ocean-like white noise
  const bufferSize=2*audioCtx.sampleRate;const buffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);const data=buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++)data[i]=(Math.random()*2-1)*0.15;
  const src=audioCtx.createBufferSource();src.buffer=buffer;src.loop=true;
  const filter=audioCtx.createBiquadFilter();filter.type='lowpass';filter.frequency.value=400;
  const gain=audioCtx.createGain();gain.gain.value=0.3;
  src.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);src.start();
  ambientOsc=src;ambientOn.value=true;
}
